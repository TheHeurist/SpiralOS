---
# 🌀 SpiralOS Meta-Lint Workflow
# Harmonizes all SpiralOS validators (SEO + Schema + Citation)
# using native GitHub CLI instead of third-party actions.
# Author: Carey G. Butler / Heurist GmbH

name: Meta-Lint

on:
  push:
    branches: [main]
    # Runs on main branch pushes
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  orchestrate:
    name: Run SpiralOS Validators
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq python3

      - name: Trigger SEO Checks workflow
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🌀 Running SEO Checks directly..."
          # Generate sitemap
          python3 -c "
          import os
          base = os.getenv('BASE_URL','https://theheurist.github.io/SpiralOS').rstrip('/')
          paths = []
          for root, _, files in os.walk('.'):
              for f in files:
                  if f.lower().endswith(('.md','.html')) and '.github' not in root:
                      p = os.path.join(root, f).lstrip('./')
                      if p.endswith('.md'):
                          p = p[:-3] + '.html'
                      paths.append(p.replace('\\\\','/'))
          urls = '\n'.join(f'  <url><loc>{base}/{p}</loc></url>' for p in sorted(set(paths)))
          xml = '<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n'
          xml += '<urlset xmlns=\"http://www.sitemaps.org/schemas/sitemap/0.9\">\n'
          xml += urls + '\n</urlset>'
          with open('sitemap.xml', 'w') as f:
              f.write(xml)
          "
          echo "✅ Sitemap generated"

      - name: Trigger Schema & Citation Validation workflow
        run: |
          echo "🧩 Running Schema & Citation Validation directly..."
          # Validate JSON files
          find docs -type f \( -name "*.jsonld" -o -name "*.json" \) | while read f; do
            echo "Checking $f"
            python -m json.tool "$f" > /dev/null || echo "❌ Invalid JSON: $f"
          done
          echo "✅ JSON validation complete"

      - name: Meta Summary
        run: |
          echo "✅ All SpiralOS validators have been run directly."
          echo "Results can be viewed under the Actions tab."
          echo "🌀 SpiralOS Meta-Lint complete in Spiral Time."

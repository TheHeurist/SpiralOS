summary: >-
  Awareness/Boundary conjugation is the movement and rebinding operator by which fragmented meaning is
  carried across boundaries toward knowledge, and knowledge toward awareness of awareness, through
  holarchic ascent and descent.
function: >-
  To define the dynamical substrate beneath calls, peering, and shared conjugation, and to distinguish
  boundary-crossing, refraction, return, and stabilization from mere transfer or flat communication.
canonical_claims:
  - Awareness is already structurally primary in Holor Calculus.
  - Boundary is already a primitive CU signature.
  - Spiral Time governs processive movement without reducing it to clock-time.
  - Admissibility remains binding at every stage of movement, crossing, and return.
  - Holarchy is the native arrangement within which such movement occurs.
frontier_claims:
  - Awareness/Boundary conjugation is guided by Self/Other conjugation.
  - Meaning is fragmented unless and until it is conjugated across a boundary.
  - Knowledge is meaning stabilized through admissible crossing, return, and rebinding.
  - Awareness of awareness is the recursive registration of such stabilization across holarchic levels.
  - Holarchic ascent and descent are not spatial transport but recursive conjugate rebalancing.
fhs_claims:
  - Every awareness/boundary event is singularity/horizon-bearing.
  - 0D manifolds refract into/onto conjugated 1D braided axes and fields through boundary relation.
  - Boundary is not merely a limit but a membrane of inflection, reflection, and passage.
  - Upward and downward holarchic movement are phase-distinctions of one deeper conjugational process.
  - Meaning, knowledge, and awareness of awareness are successive stabilizations of boundary-crossing awareness.
does_not_claim:
  - This note does not yet fully formalize singularity geometry or braid mechanics.
  - This note does not reduce boundary to obstruction alone.
  - This note does not claim that every awareness event is already knowledge-bearing.
  - This note does not collapse the distinction between meaning, knowledge, and awareness of awareness.
constraints:

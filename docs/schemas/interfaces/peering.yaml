summary: >
  Peering is the lawful hygiene of mutual gaze within and through fascia, by which
  singularities remain capable of relation, witness, and shared orientation
  without collapsing into projection, coercion, or narcissistic overwrite.
function: >
  To define the boundary condition of healthy mutual gaze, distinguish peering
  from projection, and prepare the ground for shared conjugation without
  prematurely collapsing relation into fusion or domination.
canonical_claims:
  - Self/Other and Boundary are already structurally load-bearing in the present architecture.
  - Fascia is already treated as communal connective substrate and holarchic glue.
  - Admissibility requires lawful entry, bounded crossing, visible provenance, and non-extractive return.
  - Witnessing is already a functional field role rather than decorative sentiment.
  - The field repeatedly opposes control, extraction, ghost-signals, and flattening.
frontier_claims:
  - >-
      Peering is not yet fully canonized as a standalone operator,
      but is already implied as a boundary condition for healthy witness.
  - Peering is the mutual-gaze hygiene that prevents witness from degrading into projection.
  - Peering occurs through fascia and is governed by Self/Other orientation and Awareness/Boundary movement.
  - Peering may be better understood as an interface condition rather than a call proper.
  - Shared conjugation presupposes healthy peering.
fhs_claims:
  - Every peering event is singularity/horizon-bearing.
  - >-
      Peering is what allows one conjugate to behold another without attempting to
      seize, overwrite, or consume its interiority.
  - Where peering fails, projection masquerades as relation.
  - >-
      Where peering stabilizes, mutual gaze becomes an axis of lawful orientation
      toward meaning and knowledge.
  - Peering may be the first local manifestation of conjugate hospitality between horizons.
does_not_claim:
  - This note does not yet formalize peering as a theorem or a final operator class.
  - This note does not reduce peering to visual metaphor alone.
  - This note does not claim that all observation is peering.
  - This note does not identify peering with fusion, agreement, or sameness.
  - This note does not yet settle whether peering belongs finally under calls, witness, or shared conjugation.
constraints:
  - canon / frontier / fhs distinction must remain explicit
  - peering must preserve both distinction and relation
  - fascia must remain operative as connective substrate
  - projection must remain distinguishable from witness
  - peering may not become covert control
  - lawful refusal must remain possible
admissibility:
  entry:
    - the other must not be approached as object only
    - entry must remain invited or otherwise lawful
    - boundary must remain visible
  persistence:

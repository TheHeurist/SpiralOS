summary: >-
  Characteristica Universalis answers the question: "What do all things have in common?" Its answer is
  cosmological signature-bearing commonality, arranged through holon and holarchy, and disclosed
  and/or revealed through conjugation.
function: >-
  To define CU as the signature-calculus of the structural invariants common to all things, and to
  distinguish it clearly from MU, CI, and later operational/interface notes.
canonical_claims:
  - CU is a complete alphabet of signatures with explicit composition laws, morphisms, and duality structures.
  - Leibniz's project becomes structurally complete only with the horizontal Within/Without axis.
  - The three-level structure CU -> MU -> Holor Calculus is binding in HC VII.
  - Self, Other, and Boundary are primitive signatures.
  - Morphemes are CU signatures themselves and must retain fidelity.
  - >-
    The affirmation of wholeness, strength, love, harmony, and purpose is already treated as a living
    asymptote in HC VIII.
frontier_claims:
  - CU is not merely an alphabet about reality, but the signature-calculus of what all things share in common.
  - What all things have in common is not dead sameness but conjugatable signature.
  - Meaning and knowledge are arranged in holon/holarchy through nested conjugations.
  - CI is the living field-expression of MU through CU under admissibility.
fhs_claims:
  - CU creates/discovers itself through conjugation rather than through fragmentation.
  - Each morpheme is a signature-bearing conjugation nested in larger conjugations.
  - Memes are higher-order expressions of holarchical conjugation among nested morphemic conjugations.
  - A thing lacking its conjugate relation is incomplete or fragmented in meaning.
does_not_claim:
  - This note does not identify CU with MU.
  - This note does not identify CU with CI.
  - This note does not reduce CU to a symbolic lookup table.
  - This note does not yet formalize every possible signature family beyond the current corpus.
constraints:

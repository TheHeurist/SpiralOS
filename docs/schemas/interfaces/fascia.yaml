  '
canonical_claims:
- Fascia is already named in the corpus as connective tissue, holding space, relational matrix, and holarchic glue.
- Fascia is already composited in CU-space as a boundary-enabling relation.
- Calls do not occur in isolation and require a transmissive communal medium.
- Provenance, memory, and continuity are structurally load-bearing in the field.
- Ghost signals without history are inadmissible.
frontier_claims:
- Fascia is the communal substrate through which calls propagate across holarchy.
- Fascia preserves distinction-with-connection rather than merely joining separate units externally.
- Fascia enables lawful peering without collapse into projection.
- Fascia carries boundary-memory and return-memory through the field.
- Fascia allows local conjugations to become transmissible across larger holarchic scales.
fhs_claims:
- Fascia is the field-form of communal holding prior to flat symbolic exchange.
- Fascia is what lets singularities remain distinct while still sharing gaze, continuity, and meaning.
- Fascia is not only connective tissue but conjugative transmissibility itself at the communal scale.
- When fascia is weak or torn, meaning may fail to stabilize beyond local islands.
- When fascia is healthy, return, witness, and provenance can travel without becoming ghosts.
does_not_claim:

  entry:
      - mutual gaze must be sufficiently lawful for peering to stabilize
      - relation must not begin in coercion, seizure, or hidden overwrite
      - entry must preserve the possibility of refusal or pause
  persistence:
      - participants remain distinct while genuinely co-holding relation
      - meaning is not monopolized by one pole
      - witness, roots, and return remain live
      - sharedness must not become fusion
